# =============================================================================
# Esteira de PR (roda em pull_request). NUNCA aplica — so valida e mostra o
# plano. E o "portao" antes do merge. Mantenha branch protection exigindo
# este check + review (ver SECURITY.md).
# =============================================================================
substitutions:
  _ENV: stg
  _TF_VERSION: "1.10"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1) Segredos
  - id: gitleaks
    name: zricethezav/gitleaks:latest
    args: ["detect", "--source=.", "--no-banner", "--redact", "--verbose"]

  # 2) Scan de seguranca do Terraform (misconfig)
  - id: tfsec
    name: aquasec/tfsec:latest
    args: [".", "--minimum-severity", "MEDIUM", "--no-color"]

  # 3) fmt + validate + plan (sem apply)
  - id: plan
    name: hashicorp/terraform:$_TF_VERSION
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        terraform fmt -check -recursive
        cd envs/$_ENV
        terraform init -input=false
        terraform validate
        terraform plan -input=false -no-color
