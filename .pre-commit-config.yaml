# Guardrails LOCAIS (rodam antes do commit). Instale com:
#   pip install pre-commit && pre-commit install
# Primeira linha de defesa contra segredo commitado em repo PUBLICO.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
      - id: terraform_tfsec

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

# Dica: rode `pre-commit autoupdate` periodicamente para fixar os revs mais novos.
